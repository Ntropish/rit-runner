name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Configure .env
        run: |
          touch .env

          upsert() {
            local key="$1" value="$2"
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            else
              echo "${key}=${value}" >> .env
            fi
          }

          upsert AUTH_ISSUER "${{ vars.AUTH_ISSUER }}"
          upsert STATUS_URL "${{ vars.STATUS_URL }}"
          upsert SERVICE_CLIENT_ID "${{ vars.SERVICE_CLIENT_ID }}"
          upsert SERVICE_CLIENT_SECRET "${{ secrets.SERVICE_CLIENT_SECRET }}"
          upsert CLOUDFLARE_TUNNEL_TOKEN "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}"

      - name: Deploy
        run: |
          set -a && source .env && set +a
          docker compose --profile tunnel up -d --build --remove-orphans --wait

      - name: Health check
        run: curl -sf http://localhost:4580/health || true
